<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Portfolio</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <img src="profile.jpg" alt="Profile Picture" class="profile-image">

        <h1>Abhinaya V</h1>

        <p>BSc AIML Student | Full Stack Learner</p>

    </header>

    <section>

        <h2>About Me</h2>

        <p>
            I am a BSc AIML student interested in web development and learning new technologies.
        </p>

    </section>

    <section>

        <h2>Skills</h2>

        <div class="skills">

            <span>HTML</span>

            <span>CSS</span>

            <span>JavaScript</span>

            <span>Java</span>

        </div>

    </section>

    <section>

        <h2>Projects</h2>

        <div id="projects"></div>

    </section>

    <section>

        <h2>Contact Me</h2>

        <form id="contactForm">

            <input type="text" id="name" placeholder="Your Name" required>

            <br><br>

            <input type="email" id="email" placeholder="Your Email" required>

            <br><br>

            <textarea id="message" placeholder="Your Message" required></textarea>

            <br><br>

            <button type="submit">Send</button>

        </form>

    </section>

    <script src="script.js"></script>

</body>

</html>
